name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Unit tests
        env:
          PYTHONPATH: src
          # Keep Celery from touching a real broker if a test misses a mock.
          CELERY_TASK_ALWAYS_EAGER: "true"
          CERBERUS_LHOST: "10.9.8.7"
        run: |
          pytest -q \
            tests/unit \
            tests/test_ai_planner.py \
            tests/test_ai_runner.py \
            tests/test_mcp_sessions.py \
            tests/test_mcp_actions.py \
            tests/test_waf_evasion.py \
            tests/test_sql_injection.py \
            tests/test_payload_strategy.py \
            tests/test_cve_exploit_map.py \
            tests/test_llm_unrestricted.py \
            tests/test_decision_engine.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend unit tests
        working-directory: frontend
        run: |
          npm ci
          npm test -- --run
