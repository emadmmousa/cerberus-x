name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Unit tests
        env:
          PYTHONPATH: src
        run: |
          pytest -q tests/unit tests/test_ai_planner.py tests/test_ai_runner.py tests/test_mcp_sessions.py tests/test_mcp_actions.py tests/test_waf_evasion.py

      - name: Frontend unit tests
        working-directory: frontend
        run: |
          npm ci
          npm test -- --run
