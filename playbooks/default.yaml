name: "Full Spectrum Attack"
target: "https://wks.agency"
phases:
  - name: "recon"
    tools:
      - tool: nmap
        args: ["-sV", "-p-", "-T4"]
      - tool: whatweb
        args: ["-a", "3"]
      - tool: gobuster
        args: ["dir", "-u", "{{target}}", "-w", "/usr/share/dirb/wordlists/common.txt"]
    parallel: true

  - name: "vulnerability_scan"
    tools:
      - tool: nuclei
        args: ["-t", "/root/nuclei-templates/http/cves/", "-severity", "critical,high", "-silent"]
      - tool: metasploit
        args:
          - auxiliary/scanner/portscan/tcp
          - RPORTS=80,443
          - THREADS=10
    parallel: true
    depends_on: ["recon"]

  - name: "exploitation"
    tools:
      - tool: sqlmap
        args: ["--batch", "--level=2"]
    depends_on: ["vulnerability_scan"]
