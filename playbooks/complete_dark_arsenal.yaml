name: Complete Dark Arsenal
description: Full-spectrum authorized playbook mapped to all 23 installed wrappers
evasion: medium
phases:
  - name: recon
    tools:
      - tool: rustscan
        args: ["--ulimit", "5000", "--top"]
      - tool: masscan
        args: ["-p80,443,22,8080,8443", "--rate=1000", "--wait=0"]
      - tool: nmap
        args: ["-sV", "-T4"]
      - tool: zmap
        args: ["-p", "80,443"]
      - tool: whatweb
        args: ["-a", "3"]
      - tool: theharvester
        args: ["-b", "bing"]
    parallel: true
  - name: discovery
    tools:
      - tool: gobuster
        args: ["dir", "-w", "/usr/share/dirb/wordlists/common.txt"]
      - tool: ffuf
        args: ["-ac"]
    parallel: true
    depends_on: ["recon"]
  - name: vulnerability_checks
    tools:
      - tool: nuclei
        args: ["-severity", "critical,high", "-silent"]
      - tool: nikto
        args: ["-maxtime", "60"]
      - tool: xsstrike
        args: ["--timeout", "20", "--skip"]
    parallel: false
    depends_on: ["discovery"]
  - name: credential_checks
    tools:
      - tool: hydra
        args: []
      - tool: john
        args: []
      - tool: hashcat
        args: []
    parallel: true
    depends_on: ["vulnerability_checks"]
  - name: windows_ad_helpers
    tools:
      - tool: crackmapexec
        args: []
      - tool: impacket
        args: []
      - tool: responder
        args: []
      - tool: bloodhound
        args: []
    parallel: true
    depends_on: ["credential_checks"]
  - name: postex_artifacts
    tools:
      - tool: winpeas
        args: []
      - tool: linpeas
        args: []
      - tool: sliver
        args: []
    parallel: true
    depends_on: ["windows_ad_helpers"]
  - name: exploitation_checks
    tools:
      - tool: sqlmap
        args: ["--batch", "--level=2", "--risk=1"]
      - tool: metasploit
        args: []
    depends_on: ["postex_artifacts"]
