services:
  redis:
    image: redis:alpine
    container_name: cerberus-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - cerberus-net

  orchestrator:
    build:
      context: .
      dockerfile: docker/orchestrator.Dockerfile
    container_name: cerberus-orchestrator
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - PYTHONPATH=/app/src
    volumes:
      - ./src:/app/src
      - ./playbooks:/app/playbooks
    ports:
      - "5000:5000"
    command: ["python", "-m", "orchestrator.dashboard"]
    networks:
      - cerberus-net

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - PYTHONPATH=/app/src
    volumes:
      - ./src:/app/src
    deploy:
      replicas: 4
    command: ["celery", "-A", "orchestrator.tasks", "worker", "--concurrency=8", "--loglevel=info"]
    networks:
      - cerberus-net

volumes:
  redis_data:

networks:
  cerberus-net:
    driver: bridge