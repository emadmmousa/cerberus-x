apiVersion: v1
kind: ServiceAccount
metadata:
  name: orchestrator
  namespace: cerberus-x
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: orchestrator-proxy-settings
  namespace: cerberus-x
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["cerberus-secrets"]
    verbs: ["get", "patch", "update"]
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["cerberus-config"]
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: orchestrator-proxy-settings
  namespace: cerberus-x
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: orchestrator-proxy-settings
subjects:
  - kind: ServiceAccount
    name: orchestrator
    namespace: cerberus-x
