apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: cerberus-x
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:latest
        env:
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: admin
        - name: GF_INSTALL_PLUGINS
          value: grafana-piechart-panel
        ports:
        - containerPort: 3000
        volumeMounts:
        - name: grafana-storage
          mountPath: /var/lib/grafana
        - name: grafana-datasources
          mountPath: /etc/grafana/provisioning/datasources
        - name: grafana-dashboards
          mountPath: /etc/grafana/provisioning/dashboards
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: grafana-storage
        persistentVolumeClaim:
          claimName: grafana-pvc
      - name: grafana-datasources
        configMap:
          name: grafana-datasources
      - name: grafana-dashboards
        configMap:
          name: grafana-dashboards
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-pvc
  namespace: cerberus-x
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: cerberus-x
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-service:9090
        access: proxy
        isDefault: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: cerberus-x
data:
  cerberus-dashboard.json: |
    {
      "title": "Cerberus-X Dashboard",
      "panels": [
        {
          "title": "Jobs Per Minute",
          "type": "graph",
          "targets": [
            {
              "expr": "rate(cerberus_jobs_total[1m])",
              "legendFormat": "{{tool}}"
            }
          ]
        },
        {
          "title": "Worker Queue Length",
          "type": "graph",
          "targets": [
            {
              "expr": "cerberus_queue_length",
              "legendFormat": "queue"
            }
          ]
        },
        {
          "title": "Job Success Rate",
          "type": "stat",
          "targets": [
            {
              "expr": "sum(cerberus_jobs_success) / sum(cerberus_jobs_total)"
            }
          ]
        },
        {
          "title": "Worker CPU Usage",
          "type": "graph",
          "targets": [
            {
              "expr": "rate(process_cpu_seconds_total{job='worker'}[1m])"
            }
          ]
        }
      ]
    }
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
  namespace: cerberus-x
spec:
  selector:
    app: grafana
  ports:
  - port: 3000
    targetPort: 3000
  type: ClusterIP