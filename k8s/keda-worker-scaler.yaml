# Optional: requires KEDA CRDs installed in the cluster.
# Apply with: kubectl apply -f k8s/keda-worker-scaler.yaml
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: worker-scaler
  namespace: cerberus-x
spec:
  scaleTargetRef:
    name: worker
  minReplicaCount: 1
  maxReplicaCount: 50
  pollingInterval: 10
  cooldownPeriod: 60
  triggers:
  - type: redis
    metadata:
      address: redis-service:6379
      listName: celery
      listLength: "10"
    authenticationRef:
      name: keda-redis-auth
---
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: keda-redis-auth
  namespace: cerberus-x
spec:
  secretTargetRef:
  - parameter: password
    name: cerberus-secrets
    key: REDIS_PASSWORD
