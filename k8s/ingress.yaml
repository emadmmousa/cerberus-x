apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: firebreak-ingress
  namespace: firebreak
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - firebreak.yourdomain.com
    secretName: firebreak-tls
  rules:
  - host: firebreak.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: orchestrator-service
            port:
              number: 5000
      - path: /grafana
        pathType: Prefix
        backend:
          service:
            name: grafana-service
            port:
              number: 3000