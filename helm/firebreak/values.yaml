# Values for Firebreak Helm chart

replicaCount: 2

image:
  orchestrator: emadmmousa/firebreak-orchestrator:latest
  worker: emadmmousa/firebreak-worker:latest
  metasploit: emadmmousa/firebreak-metasploit:latest
  pullPolicy: Always

redis:
  enabled: true
  password: "redis_password"
  storage: 1Gi

# Results persist to SQLite under the output PVC (+ optional Elasticsearch).
# Metasploit may use its own DB inside the MSF image; no app-level Postgres.

elasticsearch:
  enabled: true
  storage: 20Gi

metasploit:
  rpcUser: msf
  rpcPassword: "msf_rpc_password"
  rpcPort: 55553

orchestrator:
  replicas: 2
  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  logLevel: INFO

worker:
  minReplicas: 0
  maxReplicas: 50
  concurrency: 8
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "2000m"

keda:
  enabled: true
  queueLength: 10
  pollingInterval: 10
  cooldownPeriod: 60

prometheus:
  enabled: true
  storage: 10Gi

grafana:
  enabled: true
  storage: 5Gi
  adminPassword: admin

ingress:
  enabled: true
  host: app.firebreak.com
  tlsSecret: firebreak-tls

output:
  storage: 5Gi
proxy:
  existingSecret: firebreak-secrets
  host: pr.oxylabs.io
  port: "7777"
  protocol: http
  localHost: "127.0.0.1"
  localPort: "18080"

# Firebreak (W1–W5) — wired into orchestrator Deployment env
firebreak:
  multiScaffold: true
  costRoute: false
  llmModel: firebreak
  llmBaseModel: qwen2.5:7b
  # Must point at an OpenAI-compat endpoint (Compose default is ollama service)
  llmBaseUrl: "http://ollama:11434/v1"
  llmApiKey: ollama
  # Optional third OpenAI-compat scaffold
  scaffoldExtra:
    baseUrl: ""
    model: ""
    apiKey: ""
    costPer1k: "0.002"
  rbacEnforce: false
  defaultOrg: default
  edition: community
  auditEs: false
  managedHosting: false
  controlPlaneUrl: ""
  appBaseUrl: "https://app.firebreak.com"
  # Create K8s secret firebreak-auth0 with keys: domain, clientId, clientSecret, secret
  auth0:
    enabled: false
    existingSecret: firebreak-auth0
  oidc:
    enabled: false
    issuer: ""
    clientId: ""
    existingSecret: ""
    # secret keys: clientSecret (optional when existingSecret set)
