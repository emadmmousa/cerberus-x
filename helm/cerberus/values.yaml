# Values for Cerberus-X Helm chart

replicaCount: 2

image:
  orchestrator: emadmmousa/cerberus-x-orchestrator:latest
  worker: emadmmousa/cerberus-x-worker:latest
  metasploit: emadmmousa/cerberus-x-metasploit:latest
  pullPolicy: Always

redis:
  enabled: true
  password: "redis_password"
  storage: 1Gi

postgres:
  enabled: true
  password: "postgres_password"
  storage: 10Gi

elasticsearch:
  enabled: true
  storage: 20Gi

metasploit:
  rpcUser: msf
  rpcPassword: "msf_rpc_password"
  rpcPort: 55553

orchestrator:
  replicas: 2
  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  logLevel: INFO

worker:
  minReplicas: 0
  maxReplicas: 50
  concurrency: 8
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "2000m"

keda:
  enabled: true
  queueLength: 10
  pollingInterval: 10
  cooldownPeriod: 60

prometheus:
  enabled: true
  storage: 10Gi

grafana:
  enabled: true
  storage: 5Gi
  adminPassword: admin

ingress:
  enabled: true
  host: cerberus.yourdomain.com
  tlsSecret: cerberus-tls

output:
  storage: 5Gi
proxy:
  existingSecret: cerberus-secrets
  host: pr.oxylabs.io
  port: "7777"
  protocol: http
  localHost: "127.0.0.1"
  localPort: "18080"
