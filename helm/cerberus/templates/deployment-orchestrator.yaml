apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cerberus.fullname" . }}-orchestrator
  labels:
    {{- include "cerberus.labels" . | nindent 4 }}
    app: orchestrator
spec:
  replicas: {{ .Values.orchestrator.replicas }}
  selector:
    matchLabels:
      {{- include "cerberus.selectorLabels" . | nindent 6 }}
      app: orchestrator
  template:
    metadata:
      labels:
        {{- include "cerberus.selectorLabels" . | nindent 8 }}
        app: orchestrator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: orchestrator
        image: {{ .Values.image.orchestrator }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        env:
        - name: REDIS_URL
          value: redis://:{{ .Values.redis.password }}@redis-service:6379/0
        - name: ELASTICSEARCH_URL
          value: http://elasticsearch-service:9200
        - name: MSF_RPC_HOST
          value: metasploit-service
        - name: MSF_RPC_PORT
          value: "{{ .Values.metasploit.rpcPort }}"
        - name: MSF_RPC_USER
          value: {{ .Values.metasploit.rpcUser }}
        - name: MSF_RPC_PASSWORD
          value: {{ .Values.metasploit.rpcPassword }}
        - name: CERBERUS_OUTPUT_DIR
          value: /app/output
        - name: LOG_LEVEL
          value: {{ .Values.orchestrator.logLevel }}
        ports:
        - containerPort: 5000
          name: http
        - containerPort: 5001
          name: metrics
        resources:
          {{- toYaml .Values.orchestrator.resources | nindent 10 }}
        volumeMounts:
        - name: output-storage
          mountPath: /app/output
      volumes:
      - name: output-storage
        persistentVolumeClaim:
          claimName: {{ include "cerberus.fullname" . }}-output-pvc